name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: git clone --depth 1 https://github.com/pescheckit/thorn ../thorn
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y python3-dev
      - run: cargo test

  build:
    name: Build ${{ matrix.artifact }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — one build per Python version so users can pick the tightest match
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            python: "3.11"
            artifact: thorn-django-py311-linux-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            python: "3.12"
            artifact: thorn-django-py312-linux-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            python: "3.13"
            artifact: thorn-django-py313-linux-x86_64
          # Linux ARM
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            python: "3.11"
            artifact: thorn-django-py311-linux-aarch64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            python: "3.12"
            artifact: thorn-django-py312-linux-aarch64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            python: "3.13"
            artifact: thorn-django-py313-linux-aarch64
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            python: "3.12"
            artifact: thorn-django-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            python: "3.12"
            artifact: thorn-django-macos-aarch64

    steps:
      - uses: actions/checkout@v5
      - run: git clone --depth 1 https://github.com/pescheckit/thorn ../thorn

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache per matrix slot to avoid cross-contamination
          key: ${{ matrix.artifact }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y python3-dev
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Configure Python paths
        run: |
          PYTHON_PATH=$(python${{ matrix.python }} -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
          echo "PYO3_PYTHON=python${{ matrix.python }}" >> $GITHUB_ENV
          echo "PYO3_CROSS_PYTHON_VERSION=${{ matrix.python }}" >> $GITHUB_ENV
          if [ -n "$PYTHON_PATH" ]; then
            echo "RUSTFLAGS=-L ${PYTHON_PATH}" >> $GITHUB_ENV
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/thorn-django dist/${{ matrix.artifact }}
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  package-deb:
    name: Create .deb (${{ matrix.arch }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            binary: thorn-django-py311-linux-x86_64
          - arch: arm64
            binary: thorn-django-py311-linux-aarch64
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: dist/

      - name: Extract version from tag
        id: version
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          DEB_VERSION="$(echo "$RAW" | sed 's/-/~/g')"
          echo "deb=${DEB_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        env:
          DEB_VERSION: ${{ steps.version.outputs.deb }}
        run: |
          PKG_DIR="thorn-django_${DEB_VERSION}_${{ matrix.arch }}"

          install -d "${PKG_DIR}/DEBIAN"
          install -d "${PKG_DIR}/usr/local/bin"

          tar xzf dist/${{ matrix.binary }}.tar.gz -C dist/
          install -m 755 dist/${{ matrix.binary }} \
            "${PKG_DIR}/usr/local/bin/thorn-django"

          printf '%s\n' \
            "Package: thorn-django" \
            "Version: ${DEB_VERSION}" \
            "Section: devel" \
            "Priority: optional" \
            "Architecture: ${{ matrix.arch }}" \
            "Depends: python3 (>= 3.11)" \
            "Maintainer: PesCheckIT <packages@pescheckit.github.io>" \
            "Homepage: https://github.com/pescheckit/thorn-django" \
            "Description: Fast Django/DRF linter with live model introspection" \
            " Catches bugs, security issues, and performance problems by combining" \
            " static AST analysis with runtime model graph validation. 57+ checks." \
            > "${PKG_DIR}/DEBIAN/control"

          dpkg-deb --build "${PKG_DIR}"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: "*.deb"

  # TODO: Add publish-apt job once GH_PAT secret is configured.
  # It will push .deb packages to pescheckit/pescheckit.github.io APT repo.

  release:
    name: Create GitHub Release
    needs: [build, package-deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install via APT (Debian / Ubuntu)

            ```sh
            # Add signing key
            curl -fsSL https://pescheckit.github.io/gpg.key \
              | sudo gpg --dearmor -o /usr/share/keyrings/pescheckit.gpg

            # Add repository
            echo "deb [signed-by=/usr/share/keyrings/pescheckit.gpg] \
            https://pescheckit.github.io/apt stable main" \
              | sudo tee /etc/apt/sources.list.d/pescheckit.list

            sudo apt update && sudo apt install thorn-django
            ```

            ## Install via binary download

            ```sh
            # Linux — Python 3.12
            curl -fsSL https://github.com/pescheckit/thorn-django/releases/download/${{ github.ref_name }}/thorn-django-py312-linux-x86_64.tar.gz \
              | tar xz
            sudo mv thorn-django-py312-linux-x86_64 /usr/local/bin/thorn-django

            # macOS (Apple Silicon)
            curl -fsSL https://github.com/pescheckit/thorn-django/releases/download/${{ github.ref_name }}/thorn-django-macos-aarch64.tar.gz \
              | tar xz
            sudo mv thorn-django-macos-aarch64 /usr/local/bin/thorn-django
            ```

            ## Docker

            ```dockerfile
            ADD https://github.com/pescheckit/thorn-django/releases/download/${{ github.ref_name }}/thorn-django-py312-linux-x86_64.tar.gz /tmp/
            RUN tar xzf /tmp/thorn-django-py312-linux-x86_64.tar.gz -C /usr/local/bin/ \
                && mv /usr/local/bin/thorn-django-py312-linux-x86_64 /usr/local/bin/thorn-django \
                && rm /tmp/*.tar.gz
            ```

            ## Build from source

            ```sh
            cargo install --git https://github.com/pescheckit/thorn-django
            ```
          files: artifacts/*
